name: Build & Release

# Triggers:
#   - Tag push (v*): builds all platforms, publishes to GitHub Release
#   - Manual dispatch: builds + publishes (e.g. for testing)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Grant GITHUB_TOKEN permission to create releases and upload assets
permissions:
  contents: write

# Prevent concurrent builds for the same ref
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  QDRANT_VERSION: '1.17.1'

jobs:
  # ── Test Gate ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Inject license secret
        env:
          DOCMIND_LICENSE_SECRET: ${{ secrets.DOCMIND_LICENSE_SECRET }}
        run: npx tsx scripts/inject-secret.ts

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test

  # ── Build & Publish ────────────────────────────────────────────────
  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64)
          - os: macos-latest
            platform: mac-arm64
            qdrant_asset: qdrant-aarch64-apple-darwin.tar.gz
            qdrant_bin_dir: mac/arm64
            builder_flags: '-m --arm64'
          # macOS Intel (x64)
          # Cross-built on Apple Silicon — free Intel runners (macos-13)
          # are retired and queue indefinitely. No native modules in the
          # app; the x64 Qdrant binary is downloaded per matrix entry.
          - os: macos-latest
            platform: mac-x64
            qdrant_asset: qdrant-x86_64-apple-darwin.tar.gz
            qdrant_bin_dir: mac/x64
            builder_flags: '-m --x64'
          # Linux x64
          - os: ubuntu-latest
            platform: linux-x64
            qdrant_asset: qdrant-x86_64-unknown-linux-gnu.tar.gz
            qdrant_bin_dir: linux/x64
            builder_flags: '-l --x64'
          # Linux arm64
          - os: ubuntu-latest
            platform: linux-arm64
            # v1.17.x ships no aarch64 gnu build — musl is statically linked
            qdrant_asset: qdrant-aarch64-unknown-linux-musl.tar.gz
            qdrant_bin_dir: linux/arm64
            builder_flags: '-l --arm64'
          # Windows x64
          - os: windows-latest
            platform: win-x64
            qdrant_asset: qdrant-x86_64-pc-windows-msvc.zip
            qdrant_bin_dir: win/x64
            builder_flags: '-w --x64'

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Download Qdrant binary ──────────────────────────────────────
      - name: Download Qdrant (Unix)
        if: runner.os != 'Windows'
        env:
          QDRANT_ASSET: ${{ matrix.qdrant_asset }}
          BIN_DIR: ${{ matrix.qdrant_bin_dir }}
        run: |
          mkdir -p "bin/${BIN_DIR}"
          curl -L -o /tmp/qdrant.tar.gz \
            "https://github.com/qdrant/qdrant/releases/download/v${QDRANT_VERSION}/${QDRANT_ASSET}"
          tar -xzf /tmp/qdrant.tar.gz -C /tmp/
          mv /tmp/qdrant "bin/${BIN_DIR}/qdrant"
          chmod +x "bin/${BIN_DIR}/qdrant"

      - name: Download Qdrant (Windows)
        if: runner.os == 'Windows'
        env:
          QDRANT_ASSET: ${{ matrix.qdrant_asset }}
          BIN_DIR: ${{ matrix.qdrant_bin_dir }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "bin\$env:BIN_DIR"
          $url = "https://github.com/qdrant/qdrant/releases/download/v$env:QDRANT_VERSION/$env:QDRANT_ASSET"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\qdrant.zip"
          Expand-Archive -Path "$env:TEMP\qdrant.zip" -DestinationPath "$env:TEMP\qdrant-extracted" -Force
          Move-Item "$env:TEMP\qdrant-extracted\qdrant.exe" "bin\$env:BIN_DIR\qdrant.exe"

      # ── Generate license secret ─────────────────────────────────────
      # Must run BEFORE typecheck since _license-secret.ts is imported
      # by license-activation.ts and needs to exist for tsc to pass.
      - name: Inject license secret
        env:
          DOCMIND_LICENSE_SECRET: ${{ secrets.DOCMIND_LICENSE_SECRET }}
        run: npx tsx scripts/inject-secret.ts

      # ── Build ───────────────────────────────────────────────────────
      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build app
        env:
          DOCMIND_LICENSE_SECRET: ${{ secrets.DOCMIND_LICENSE_SECRET }}
        run: npm run build

      # ── Package & Publish ────────────────────────────────────────────
      # electron-builder detects GH_TOKEN and publishes to GitHub Releases.
      # --publish always: uploads artifacts to the release matching the tag.
      # For workflow_dispatch (no tag): creates a draft release.
      #
      # ── macOS signing & notarization setup ──────────────────────────
      # Writes the App Store Connect API key to disk and exports signing/
      # notarization env vars via GITHUB_ENV (macOS jobs only). Signing uses
      # CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD; notarization uses the
      # API-key trio (electron-builder auto-notarizes + staples when set).
      # CSC vars must NOT be set on Linux/Windows jobs — an empty or wrong-type
      # cert crashes electron-builder there, hence the mac-only guard.
      - name: Setup macOS signing & notarization
        if: startsWith(matrix.platform, 'mac')
        env:
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          {
            echo "CSC_LINK=${{ secrets.CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
            echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
          } >> "$GITHUB_ENV"

      # IMPORTANT: Do NOT pass empty CSC_LINK or WIN_CSC_LINK — electron-builder
      # resolves "" as CWD path and crashes. macOS signing env comes from the
      # setup step above; CSC_IDENTITY_AUTO_DISCOVERY=false disables keychain
      # auto-discovery (explicit CSC_LINK still applies).
      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.builder_flags }} --publish always

      # ── Upload artifacts (backup, independent of Release) ───────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docmind-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.yaml
            release/*.blockmap
          if-no-files-found: warn
          retention-days: 14
